<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SgP - Painel de Projetos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Portal SgP</a>
        <div class="text-white d-flex align-items-center">
            <span class="me-3" th:text="${session.usuarioLogado.nome} + ' (' + ${session.usuarioLogado.funcao} + ')'"></span>
            <a href="/logout" class="btn btn-sm btn-outline-light">Sair</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Projetos Ativos</h2>
        <a th:href="@{/projeto/novo}" class="btn btn-primary" th:if="${session.usuarioLogado.funcao == 'GESTOR'}">+ Novo Projeto</a>
    </div>
    
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Projeto</th>
                        <th>Descrição</th>
                        <th>Progresso</th>
                        <th class="text-end">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="projeto : ${projetos}">
                        <td th:text="${projeto.id}"></td>
                        <td th:text="${projeto.nome}" class="fw-bold"></td>
                        <td th:text="${projeto.descricao}"></td>
                        <td class="align-middle">
                            <div class="progress" style="height: 20px;">
                                <div class="progress-bar" role="progressbar" 
                                     th:classappend="${projeto.percentualConclusao == 100.0 ? 'bg-success' : 'bg-primary'}"
                                     th:style="|width: ${projeto.percentualConclusao}%|" 
                                     th:text="|${projeto.percentualConclusao}%|">
                                </div>
                            </div>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/projeto/{id}(id=${projeto.id})}" class="btn btn-sm btn-primary">Ver Tarefas</a>
                            <a th:href="@{/projeto/{id}/excluir(id=${projeto.id})}"
                               class="btn btn-sm btn-danger ms-1"
                               th:if="${session.usuarioLogado.funcao == 'GESTOR'}"
                               onclick="return confirm('Excluir este projeto?')">
                               Excluir
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(projetos)}">
                        <td colspan="5" class="text-center text-muted py-4">Nenhum projeto encontrado para o seu usuário.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
