<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nova Tarefa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Nova Tarefa para: <span th:text="${projeto.nome}">Projeto</span></h4>
        </div>
        <div class="card-body">
            
            <form th:action="@{'/projeto/' + ${projeto.id} + '/tarefa/salvar'}" th:object="${tarefa}" method="post">
                
                <div class="mb-3">
                    <label class="form-label">Título da Tarefa</label>
                    <input type="text" class="form-control" th:field="*{titulo}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Descrição</label>
                    <textarea class="form-control" th:field="*{descricao}" rows="3" required></textarea>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a th:href="@{'/projeto/' + ${projeto.id} + '/tarefas'}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-success">Salvar Tarefa</button>
                </div>
            </form>
            
        </div>
    </div>
</div>
</body>
</html>
