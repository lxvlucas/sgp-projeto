<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SgP - Novo Projeto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

<div class="container" style="max-width: 600px;">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Cadastrar Novo Projeto</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/projeto/salvar}" th:object="${projeto}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nome do Projeto</label>
                    <input type="text" class="form-control" th:field="*{nome}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Descrição</label>
                    <textarea class="form-control" th:field="*{descricao}" rows="3" required></textarea>
                </div>
                
                <div class="d-flex justify-content-between mt-4">
                    <a href="/" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Salvar Projeto</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
