<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SgP - Tarefas do Projeto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Portal SgP</a>
        <div class="text-white d-flex align-items-center">
            <span class="me-3" th:text="${session.usuarioLogado.nome} + ' (' + ${session.usuarioLogado.funcao} + ')'"></span>
            <a href="/logout" class="btn btn-sm btn-outline-light">Sair</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 th:text="'Tarefas do Projeto: ' + ${projeto.nome}">Tarefas do Projeto</h2>
        <div>
            <a th:href="@{/projeto/{id}/tarefa/nova(id=${projeto.id})}" class="btn btn-primary" th:if="${session.usuarioLogado.funcao == 'GESTOR'}">+ Nova Tarefa</a>
            <a href="/" class="btn btn-outline-secondary">Voltar ao Painel</a>
        </div>
    </div>
    
    <table class="table table-bordered table-striped bg-white shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Responsável</th>
                <th>Status</th>
                <th class="text-center">Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="tarefa : ${tarefas}">
                <td th:text="${tarefa.id}">1</td>
                <td th:text="${tarefa.titulo}">Nome da Tarefa</td>
                <td th:text="${tarefa.responsavel != null ? tarefa.responsavel.nome : 'Sem responsável'}">Nome do Responsável</td>
                <td>
                    <span class="badge" 
                          th:classappend="${tarefa.status == 'PENDENTE' ? 'bg-warning text-dark' : (tarefa.status == 'AGUARDANDO_VALIDACAO' ? 'bg-info text-dark' : 'bg-success')}"
                          th:text="${tarefa.status}">PENDENTE
                    </span>
                </td>
                <td class="text-center">
                    <form th:action="@{/tarefa/{id}/executar(id=${tarefa.id})}" method="post" class="d-inline" th:if="${tarefa.status == 'PENDENTE'}">
                        <button type="submit" class="btn btn-sm btn-primary">Registrar Execução</button>
                    </form>
                    
                    <form th:action="@{/tarefa/{id}/validar(id=${tarefa.id})}" method="post" class="d-inline" th:if="${session.usuarioLogado.funcao == 'GESTOR' and tarefa.status == 'AGUARDANDO_VALIDACAO'}">
                        <button type="submit" class="btn btn-sm btn-success">Validar</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(tarefas)}">
                <td colspan="5" class="text-center text-muted">Nenhuma tarefa cadastrada neste projeto.</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
